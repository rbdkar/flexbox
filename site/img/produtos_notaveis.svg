<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200">
  <rect width="300" height="200" fill="#fef5e4"/>
  <text x="150" y="30" text-anchor="middle" font-family="Georgia" font-size="14" font-weight="bold" fill="#1a5276">PRODUTOS NOTÁVEIS</text>
  <text x="150" y="75" text-anchor="middle" font-family="Georgia" font-size="15" fill="#2e86c1">(a+b)² = a²+2ab+b²</text>
  <text x="150" y="110" text-anchor="middle" font-family="Georgia" font-size="15" fill="#e74c3c">(a-b)² = a²-2ab+b²</text>
  <text x="150" y="148" text-anchor="middle" font-family="Georgia" font-size="14" fill="#27ae60">(a+b)(a-b) = a²-b²</text>
  <text x="150" y="180" text-anchor="middle" font-family="Arial" font-size="11" fill="#888">Identidades algébricas fundamentais</text>
</svg>
