<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200">
  <rect width="300" height="200" fill="#fdf2f8"/>
  <text x="150" y="40" text-anchor="middle" font-family="Georgia" font-size="16" font-weight="bold" fill="#1a5276">EQUAÇÃO 1º GRAU</text>
  <text x="150" y="110" text-anchor="middle" font-family="Georgia" font-size="30" fill="#2e86c1">ax + b = 0</text>
  <text x="150" y="150" text-anchor="middle" font-family="Georgia" font-size="22" fill="#f39c12">x = -b/a</text>
  <text x="150" y="180" text-anchor="middle" font-family="Arial" font-size="12" fill="#555">Encontre o valor de x</text>
